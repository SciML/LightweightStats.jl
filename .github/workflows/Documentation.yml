name: "Documentation"

on:
  pull_request:
  push:
    branches:
      - main
    tags: ["*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  documentation:
    name: "Documentation"
    uses: "SciML/.github/.github/workflows/documentation.yml@v1"
    with:
      julia-version: "1"
      coverage: false
    secrets: "inherit"
